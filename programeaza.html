<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - EstateGroup</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="contact-page">

    <header class="navbar">
        <div class="logo">
            <div class="logo-icon"></div>
            <span>EstateGroup</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">Acasă</a>
            <a href="apartamente.html">Apartamente</a>
            <a href="case.html">Case</a>
            <a href="penthousuri.html">Penthouse-uri</a>
            <a href="facilitati.html">Facilități</a>
        </nav>
        <button class="btn btn-primary nav-btn">Programează o consultație</button>
    </header>

    <main class="contact-container">
        <section class="consultation-section">
    <div class="consultation-container">

        <!-- Stânga -->
        <div class="consultation-left">
            <a href="index.html" class="back-link">← Înapoi</a>

            <img src="assets/agent.jpg" alt="Agent imobiliar">

            <div class="brand">
                <span class="logo-icon"></span>
                <p>EstateGroup</p>
            </div>
        </div>

        <!-- Dreapta -->
        <div class="consultation-right">
            <h2>Programează o consultație</h2>

            <form class="consultation-form" id="consultationForm" novalidate>

                        <label for="nume">Nume</label>
                        <input type="text" id="nume" placeholder="ex: Popescu">
                        <span class="field-error" id="err-nume">Câmpul Nume nu poate fi gol.</span>

                        <label for="prenume">Prenume</label>
                        <input type="text" id="prenume" placeholder="ex: Ion">
                        <span class="field-error" id="err-prenume">Câmpul Prenume nu poate fi gol.</span>

                        <label for="telefon">Nr de telefon</label>
                        <input type="text" id="telefon" class="short" placeholder="ex: 069123456">
                        <span class="field-error" id="err-telefon">Introduceți un număr valid (doar cifre).</span>

                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="ex: ion@email.com">
                        <span class="field-error" id="err-email">Introduceți un email valid.</span>

                        <button type="submit">Trimite</button>

                        <div class="success-msg" id="successMsg">
                            ✓ Mulțumim! Vă vom contacta în cel mai scurt timp.
                        </div>
                    </form>
        </div>

    </div>
</section>
    </main>

    <script src="animation.js"></script>
</body>
</html>
