<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - EstateGroup</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="contact-page">

    <header class="navbar">
        <div class="logo">
            <div class="logo-icon"></div>
            <span>EstateGroup</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">Acasă</a>
            <a href="#">Apartamente</a>
            <a href="#">Case</a>
            <a href="#">Penthouse-uri</a>
            <a href="#">Facilități</a>
        </nav>
        <button class="btn btn-primary nav-btn">Programează o consultație</button>
    </header>

    <main class="contact-container">
        <section class="consultation-section">
    <div class="consultation-container">

        <!-- Stânga -->
        <div class="consultation-left">
            <a href="index.html" class="back-link">← Înapoi</a>

            <img src="assets/agent.jpg" alt="Agent imobiliar">

            <div class="brand">
                <span class="logo-icon"></span>
                <p>EstateGroup</p>
            </div>
        </div>

        <!-- Dreapta -->
        <div class="consultation-right">
            <h2>Programează o consultație</h2>

            <form class="consultation-form">
                <label>Nume</label>
                <input type="text">

                <label>Prenume</label>
                <input type="text">

                <label>Nr de telefon</label>
                <input type="text" class="short">

                <label>Email</label>
                <input type="email">

                <button type="submit">Trimite</button>
            </form>
        </div>

    </div>
</section>
    </main>

    <script src="animation.js"></script>
</body>
</html>
